<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy rounded square background -->
  <rect width="32" height="32" rx="7" fill="#2e3257"/>
  <!-- Accent bottom-right pip to hint at the "AI" double meaning -->
  <rect x="20" y="20" width="9" height="9" rx="3" fill="#dfc5a4" opacity="0.9"/>
  <!-- 愛 kanji centered, serif, cream -->
  <text
    x="15" y="22"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="19"
    font-weight="700"
    fill="#fffef7"
  >愛</text>
</svg>
