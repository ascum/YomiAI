services:
  mongodb:
    image: mongo:latest
    container_name: nba_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=nba_logs

  redis:
    image: redis:alpine
    container_name: nba_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
